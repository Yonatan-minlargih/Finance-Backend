spring.application.name=cost-service

spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# ====================== DATABASE ======================
spring.datasource.url=${COST_DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ====================== KEYCLOAK ======================
keycloak.server-url=${KEYCLOAK_SERVER_URL}
keycloak.realm=${KEYCLOAK_REALM}
keycloak.client-id=${COST_CLIENT_ID}
keycloak.client-secret=${COST_CLIENT_SECRET}

# ====================== RABBITMQ ======================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# RabbitMQ Connection Stability
spring.rabbitmq.connection-timeout=15000
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.max-interval=10000

rabbitmq.cost-events-exchange=cost.events.exchange

# SEPARATE QUEUES FOR EACH ENTITY TYPE
rabbitmq.create-cost-record-queue=cost.create.costRecord.queue
rabbitmq.update-cost-record-queue=cost.update.costRecord.queue
rabbitmq.delete-cost-record-queue=cost.delete.costRecord.queue

rabbitmq.create-product-queue=cost.create.product.queue
rabbitmq.update-product-queue=cost.update.product.queue
rabbitmq.delete-product-queue=cost.delete.product.queue

rabbitmq.create-cost-center-queue=cost.create.costCenter.queue
rabbitmq.update-cost-center-queue=cost.update.costCenter.queue
rabbitmq.delete-cost-center-queue=cost.delete.costCenter.queue

rabbitmq.create-profit-center-queue=cost.create.profitCenter.queue
rabbitmq.update-profit-center-queue=cost.update.profitCenter.queue
rabbitmq.delete-profit-center-queue=cost.delete.profitCenter.queue

rabbitmq.create-standard-cost-rate-queue=cost.create.standardCostRate.queue
rabbitmq.update-standard-cost-rate-queue=cost.update.standardCostRate.queue

rabbitmq.create-cogs-formula-queue=cost.create.cogsFormula.queue
rabbitmq.update-cogs-formula-queue=cost.update.cogsFormula.queue

rabbitmq.create-profitability-analysis-queue=cost.create.profitabilityAnalysis.queue
rabbitmq.update-profitability-analysis-queue=cost.update.profitabilityAnalysis.queue

rabbitmq.create-withholding-tax-rule-queue=cost.create.withholdingTaxRule.queue
rabbitmq.update-withholding-tax-rule-queue=cost.update.withholdingTaxRule.queue

rabbitmq.cost-calculated-queue=cost.calculated.queue
rabbitmq.cogs-computed-queue=cost.cogs.computed.queue

# ====================== JWT CONFIG (Docker-aware) ======================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/finance-realm}

# Most Important Line - Internal Docker communication
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs}

spring.security.oauth2.resourceserver.jwt.audiences=${KEYCLOAK_AUDIENCES:account}

# ====================== LOGGING ======================
logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.amqp.rabbit.core.RabbitTemplate=DEBUG
logging.level.com.example.cost_service=DEBUG
logging.level.org.springframework.boot.actuate.health=INFO
logging.level.org.springframework.boot.actuate.amqp=INFO

# ====================== FEIGN CLIENT URLS ======================
core-finance-service.url=${FINANCE_SERVICE_URL:http://core-finance-service:8080}
payroll-service.url=${PAYROLL_SERVICE_URL:http://payroll-service:8080}
transactional-service.url=${TRANSACTION_SERVICE_URL:http://transaction-service:8080}

# ====================== FEIGN CONFIGURATION ======================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000
feign.client.config.default.loggerLevel=full
feign.client.config.core-finance-service.path=/api/v1/periods

# ====================== EXTERNAL PAYROLL EVENTS ======================
rabbitmq.exchange.payroll=payroll.exchange
rabbitmq.routing-key.payroll.approved=payroll.approved
rabbitmq.queue.cost-payroll-approved=cost.payroll-approved.queue

