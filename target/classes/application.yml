#     lease-expiration-duration-in-seconds: 90

# Feign Clients
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
  httpclient:
    enabled: true
    max-connections: 200
    max-connections-per-route: 50

# External Service URLs
employee:
  service:
    url: ${EMPLOYEE_SERVICE_URL:http://localhost:8080/employee-service}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always

# JWT
jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForJWTTokenGeneration}
  expiration: 86400

# Multi-tenancy
multitenancy:
  default-tenant: default
  header: X-Tenant-ID

# Logging
logging:
  level:
    com.financial.corefinance: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/core-finance-service.log