server:
  port: 8080

spring:
  application:
    name: core-finance-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
  datasource:
    url: ${CORE_FINANCE_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    dynamic: ${RABBITMQ_DYNAMIC:true}

rabbitmq:
  financeEventsExchange: finance.events.exchange
  createJournalQueue: finance.create.journal.queue
  updateJournalQueue: finance.update.journal.queue
  deleteJournalQueue: finance.delete.journal.queue
  createAccountQueue: finance.create.account.queue
  updateAccountQueue: finance.update.account.queue
  deleteAccountQueue: finance.delete.account.queue
  createBudgetQueue: finance.create.budget.queue
  updateBudgetQueue: finance.update.budget.queue
  createFiscalYearQueue: finance.create.fiscal-year.queue
  closeFiscalYearQueue: finance.close.fiscal-year.queue
  generateReportQueue: finance.generate.report.queue

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: ${KEYCLOAK_REALM}
  client-id: ${CORE_FINANCE_CLIENT_ID}
  client-secret: ${CORE_FINANCE_CLIENT_SECRET}

services:
  transactional:
    url: ${TRANSACTIONAL_SERVICE_URL:http://transaction-service:8080}
  costing:
    url: ${COSTING_SERVICE_URL:http://cost-service:8080}
  payroll:
    url: ${PAYROLL_SERVICE_URL:http://payroll-service:8080}

integration:
  contract-version: ${INTEGRATION_CONTRACT_VERSION:v1}

multitenancy:
  header: X-Tenant-ID

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework: ${LOGGING_LEVEL_SPRING:INFO}
    com.financial.corefinance: ${LOGGING_LEVEL_APPLICATION:INFO}